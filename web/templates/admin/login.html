{{define "login"}}{{template "adminhead" .}}
<div class="login-wrap">
  <div class="login-card">

    <!-- Left decorative panel -->
    <div class="login-left">
      <div class="login-geo g1"></div>
      <div class="login-geo g2"></div>
      <div class="login-geo g3"></div>
      <div class="login-pill">INSUVIT</div>
      <div class="login-label">ADMIN PANEL</div>
    </div>

    <!-- Kanan: Form Login -->
    <div class="login-right">
      <div class="login-avatar">
        {{if .Settings.admin_photo}}<img src="/static/images/{{.Settings.admin_photo}}" alt="Admin">{{else}}<i data-feather="shield" style="width: 40px; height: 40px; color: #fff;"></i>{{end}}
      </div>
      <h1 class="login-title">Selamat Datang</h1>

      {{if .Error}}
      <div class="login-err">{{.Error}}</div>
      {{end}}

      <form method="post" action="/admin/login" autocomplete="off" class="lf">
        
        <div class="lf-row">
          <div class="lf-ico"><i data-feather="user"></i></div>
          <input type="text" name="username" autocomplete="username" placeholder="Username" required>
        </div>

        <div class="lf-row">
          <div class="lf-ico"><i data-feather="lock"></i></div>
          <input type="password" id="pw-input" name="password" autocomplete="current-password" placeholder="Kata Sandi" required>
          <button type="button" class="lf-eye" onclick="togglePassword()" title="Tampilkan sandi">
            <i data-feather="eye" id="pw-eye"></i>
          </button>
        </div>
        <div class="lf-bottom">
          <button type="submit" class="lf-btn">MASUK</button>
        </div>
      </form>

      <div class="lf-divider">
        <span>atau</span>
      </div>

      <a href="/admin/auth/google" class="lf-google-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20" height="20">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Masuk dengan Google
      </a>
    </div>

  </div>
</div>
<script>
  document.getElementById('togglePassword').addEventListener('click', function() {
    var inp = document.getElementById('passwordInput');
    var isPassword = inp.type === 'password';
    inp.type = isPassword ? 'text' : 'password';
    document.getElementById('eyeShow').style.display = isPassword ? 'none' : '';
    document.getElementById('eyeHide').style.display = isPassword ? '' : 'none';
  });
</script>
{{template "adminfoot" .}}{{end}}
